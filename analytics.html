            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
        <a href="analytics.html" class="flex flex-col items-center text-blue-600">
            <svg class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" /></svg>
            <span class="text-[10px] font-bold uppercase">Maps</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center text-slate-400 dark:text-slate-500 hover:text-blue-600 transition-colors">

    <main class="flex-1 flex flex-col h-screen overflow-y-auto pb-24 lg:pb-0">
        <header class="h-20 bg-white/80 dark:bg-brand-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 lg:px-10 sticky top-0 z-30 shrink-0 transition-colors">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileMenu()" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    <svg class="w-6 h-6 text-slate-900 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
                <h1 class="text-lg font-bold text-slate-900 dark:text-white">Data Analytics</h1>
            </div>

            <div class="relative ml-2">
                <button onclick="toggleProfileMenu(event)" class="w-10 h-10 bg-blue-600 rounded-full text-white font-bold user-initials-display ring-4 ring-blue-50 dark:ring-slate-800 flex items-center justify-center hover:scale-105 transition-transform z-50">EP</button>
                
                <div id="profileDropdown" class="hidden absolute right-0 mt-3 w-56 bg-white dark:bg-[#111827] rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 py-2 z-50 transform origin-top-right transition-all">
                    <div class="px-4 py-3 border-b border-slate-100 dark:border-slate-800">
                        <p class="text-sm font-bold text-slate-900 dark:text-white">Emzor Pharma</p>
                        <p class="text-xs text-slate-500">admin@emzorpharma.com</p>
                    </div>
                    <div class="py-1">
                        <a href="settings.html" class="flex items-center px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <svg class="w-4 h-4 mr-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
                            Profile Settings
                        </a>
                    </div>
                    <div class="py-1 border-t border-slate-100 dark:border-slate-800">
                        <button id="themeToggle" class="w-full flex items-center px-4 py-2 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            <svg class="w-4 h-4 mr-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
                            Switch Theme

                        <button onclick="window.location.href='index.html'" class="w-full flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors font-semibold">
                            <svg class="w-4 h-4 mr-3 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>

                        </button>
                    </div>

        <div class="p-6 lg:p-10 fade-in w-full max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="bg-white dark:bg-[#111827] p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm transition-colors">

                    <div class="relative h-64 w-full">
                        <canvas id="scanChart"></canvas>
                    </div>
                </div>

                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>
                
            </div>
        </div>

    <div id="batchModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#111827] p-8 rounded-[2.5rem] w-full max-w-lg shadow-2xl scale-in border border-slate-200 dark:border-slate-800 transition-colors">
            <h2 class="text-2xl font-black mb-6 text-slate-900 dark:text-white">Create New Batch</h2>
            <div class="space-y-4">
                <input type="text" placeholder="Product Name" class="w-full px-5 py-4 border border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-[#0B1120] text-slate-900 dark:text-white rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" placeholder="Batch ID" class="w-full px-5 py-4 border border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-[#0B1120] text-slate-900 dark:text-white rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                    <input type="number" placeholder="Quantity" class="w-full px-5 py-4 border border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-[#0B1120] text-slate-900 dark:text-white rounded-2xl outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                </div>
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="document.getElementById('batchModal').classList.add('hidden')" class="flex-1 py-4 font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-2xl transition-colors">Cancel</button>
                <button onclick="document.getElementById('batchModal').classList.add('hidden'); alert('Batch generated!');" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-600/30 transition-colors">Generate</button>
            </div>
        </div>
    </div>

    <script src="/JS/main.js"></script>
    <script>
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-hidden');
            overlay.classList.toggle('hidden');
        }

        function toggleProfileMenu(event) {
            if(event) event.stopPropagation();
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('hidden');
        }

        document.addEventListener('click', (event) => {
            const dropdown = document.getElementById('profileDropdown');
            const button = document.querySelector('.user-initials-display');
            if (!dropdown.classList.contains('hidden') && !dropdown.contains(event.target) && event.target !== button) {
                dropdown.classList.add('hidden');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('themeToggle');
            const htmlElement = document.documentElement;
            
            // Check Theme
            if(localStorage.getItem('theme') === 'dark') htmlElement.classList.add('dark');
            
            if (themeBtn) {
                themeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    htmlElement.classList.toggle('dark'); 
                    localStorage.setItem('theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
                    window.location.reload(); // Reload to update chart colors
                });
            }

            // LOAD CHART.JS
            const isDark = document.documentElement.classList.contains('dark');
            const textColor = isDark ? '#94a3b8' : '#64748b'; 
            const gridColor = isDark ? '#1e293b' : '#f1f5f9'; 

            Chart.defaults.color = textColor;
            Chart.defaults.font.family = "'Inter', sans-serif";

            // Line Chart
            new Chart(document.getElementById('scanChart'), {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{ 
                        label: 'Total Scans', 
                        data: [1200, 1900, 3000, 5000], 
                        borderColor: '#1D4ED8', 
                        backgroundColor: 'rgba(29, 78, 216, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { border: {display: false}, grid: { color: gridColor } },
                        x: { border: {display: false}, grid: { display: false } }
                    }
                }
            });

            // Doughnut Chart
            new Chart(document.getElementById('doughnutChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Genuine', 'Counterfeit Flagged'],
                    datasets: [{ 
                        data: [92, 8], 
                        backgroundColor: ['#10B981', '#EF4444'], 
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        });
    </script>
</body>
