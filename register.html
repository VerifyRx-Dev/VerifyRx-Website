<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Company | VerifyRx</title>
            <link rel="icon" type="image/png" href="/Images/QR logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] } 
                } 
            } 
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex items-center justify-center p-6 py-12">
    
    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl p-10 border border-slate-100 relative">
        
        <a href="index.html" class="absolute top-8 left-8 text-slate-400 hover:text-slate-900 transition font-medium text-sm">&larr; Back to Home</a>

        <div class="text-center mb-10 mt-6">
            <a href="index.html" class="inline-block mb-6">
                <img src="Images/QR logo.png" alt="Logo" class="h-10 w-auto mx-auto object-contain">
            </a>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Create an Account</h1>
            <p class="text-slate-500 text-sm mt-3 leading-relaxed">Join the global network of pharmaceutical companies protecting patients with cryptographic verification.</p>
        </div>
        
        <form onsubmit="handleRegister(event)">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Company Name</label>
                    <input type="text" id="company-name-input" required placeholder="e.g. Emzor Pharmaceuticals" 
                           class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition font-medium">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">NAFDAC ID</label>
                        <input type="text" required placeholder="NAF-882910" 
                               class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition font-medium">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Business Email</label>
                        <input type="email" required placeholder="admin@company.com" 
                               class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Create Password</label>
                    <input type="password" required placeholder="••••••••" 
                           class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition font-medium">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-1 transition duration-300">
                        Register Company &rarr;
                    </button>
                </div>
            </div>
        </form>
        
        <div class="mt-8 pt-8 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-500 font-medium">Already part of the network? <a href="login.html" class="text-blue-600 font-bold hover:underline">Log in here</a></p>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            // Prevent the page from just reloading
            event.preventDefault();
            
            // Grab the name from the input field
            const name = document.getElementById('company-name-input').value;
            
            // Save the name to the browser's memory so dashboard.html can find it
            localStorage.setItem('verifyRx_user', name);
            
            // Redirect to the dashboard
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
