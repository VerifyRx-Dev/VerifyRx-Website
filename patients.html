<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Medicine | VerifyRx</title>
    
    <link rel="icon" type="image/png" href="/Images/QR logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { brand: { dark: '#0B1120', blue: '#1D4ED8' } } } } 
        }
    </script>
    <link rel="stylesheet" href="/CSS/Style.css">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* Hide the default ugly border from the scanner library */
        #reader { border: none !important; }
        #reader video { border-radius: 1.5rem; object-fit: cover; }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .scan-pulse::before {
            content: '';
            position: absolute;
            inset: -10px;
            border: 4px solid #1D4ED8;
            border-radius: 2rem;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-brand-dark min-h-screen flex flex-col items-center p-6 transition-colors duration-300">

    <nav class="w-full max-w-md flex justify-between items-center mb-8 pt-4">
        <div class="flex items-center gap-3">
            <img src="/Images/QR logo.png" class="h-8 bg-white rounded-md p-1 shadow-sm" alt="Logo">
            <span class="font-black text-xl tracking-tight text-slate-900 dark:text-white">VerifyRx</span>
        </div>
        <a href="index.html" class="text-xs font-bold text-slate-500 hover:text-slate-900 dark:hover:text-white bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-full transition-colors">EXIT</a>
    </nav>

    <div class="w-full max-w-md flex flex-col items-center relative z-10 flex-1">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-slate-900 dark:text-white mb-2">Scan Medication</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400">Position the VerifyRx QR code inside the frame to instantly check authenticity.</p>
        </div>

        <div class="relative w-full aspect-[4/5] bg-black rounded-[2rem] shadow-2xl overflow-hidden scan-pulse p-1">
            <div id="reader" class="w-full h-full rounded-[1.8rem] overflow-hidden bg-slate-900 flex items-center justify-center">
                <p id="loadingText" class="text-slate-400 text-sm font-bold animate-pulse">Initializing Camera...</p>
            </div>

            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-3/4 aspect-square border-2 border-white/30 relative">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-blue-500 rounded-tl-xl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-blue-500 rounded-tr-xl"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-blue-500 rounded-bl-xl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-blue-500 rounded-br-xl"></div>
                    <div class="absolute top-0 left-0 w-full h-0.5 bg-blue-500 shadow-[0_0_15px_#3b82f6] scan-line" style="animation: scan 2.5s ease-in-out infinite alternate;"></div>
                </div>
            </div>
        </div>

        <style>
            @keyframes scan { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        </style>

        <div class="mt-8 flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
            <svg class="w-4 h-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg>
            End-to-End Encrypted
        </div>
    </div>

    <button onclick="simulateScan()" class="mt-auto mb-4 text-[10px] text-slate-300 dark:text-slate-700 hover:text-slate-500 transition-colors uppercase tracking-widest font-bold">
        Simulate Demo Scan
    </button>

    <div id="resultOverlay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div id="resultCard" class="bg-white dark:bg-[#111827] rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl transform scale-90 transition-transform duration-300 border border-slate-200 dark:border-slate-800">
            
            <div id="resultIcon" class="w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center shadow-inner"></div>
            
            <h2 id="resultTitle" class="text-2xl font-black mb-2 uppercase tracking-tight"></h2>
            <p id="resultText" class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6"></p>

            <div id="resultData" class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-4 mb-8 text-left border border-slate-100 dark:border-slate-700 hidden">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Product Details</p>
                <p class="font-bold text-slate-900 dark:text-white" id="dataProduct">Paracetamol 500mg</p>
                <p class="text-xs text-slate-500" id="dataManufacturer">Emzor Pharmaceuticals</p>
                <div class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700 flex justify-between">
                    <span class="text-xs font-mono text-blue-600 dark:text-blue-400" id="dataBatch">BATCH-882</span>
                    <span class="text-xs text-slate-500">Exp: 12/2026</span>
                </div>
            </div>

            <button id="actionBtn" onclick="closeResult()" class="w-full py-4 text-white rounded-2xl font-bold shadow-lg transition-transform active:scale-95"></button>
        </div>
    </div>

    <script>
        // THEME LOGIC
        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        let html5QrCode;
        
        // This array simulates our "Database" for the One-Time Scan Lock
        let scannedCodesDatabase = [];
        let isScanningPaused = false;

        document.addEventListener("DOMContentLoaded", () => {
            html5QrCode = new Html5Qrcode("reader");
            startScanner();
        });

        function startScanner() {
            document.getElementById('loadingText').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText, decodedResult) => {
                    if(!isScanningPaused) {
                        handleSuccessfulScan(decodedText);
                    }
                },
                (errorMessage) => {
                    // Ignore background scan errors
                    document.getElementById('loadingText').style.display = 'none';
                }
            ).catch((err) => {
                console.error("Camera access failed", err);
                document.getElementById('loadingText').innerText = "Camera access required for scanning.";
            });
        }

        function handleSuccessfulScan(qrCodeString) {
            isScanningPaused = true;
            
            // ONE-TIME SCAN LOGIC (The Mic Drop feature)
            if (scannedCodesDatabase.includes(qrCodeString)) {
                // Code has been seen before! Show USED/COUNTERFEIT warning.
                showResultUI('used', qrCodeString);
            } else {
                // First time seeing this code! Show GENUINE.
                scannedCodesDatabase.push(qrCodeString);
                showResultUI('genuine', qrCodeString);
            }
        }

        // HIDDEN DEMO BUTTON (Cycles through the 3 states if camera won't work)
        let demoCounter = 0;
        function simulateScan() {
            if(demoCounter === 0) handleSuccessfulScan("DEMO-CODE-123"); // Genuine
            else if(demoCounter === 1) handleSuccessfulScan("DEMO-CODE-123"); // Used (because it's in the array now!)
            else handleSuccessfulScan("FAKE-RANDOM-STRING"); // Fake fallback
            
            demoCounter++;
        }

        function showResultUI(state, codeStr) {
            const overlay = document.getElementById('resultOverlay');
            const card = document.getElementById('resultCard');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const text = document.getElementById('resultText');
            const dataBox = document.getElementById('resultData');
            const btn = document.getElementById('actionBtn');

            overlay.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-90'), 10);

            if (state === 'genuine') {
                icon.innerHTML = `<svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>`;
                icon.className = "w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400";
                
                title.innerText = "Genuine Product";
                title.className = "text-2xl font-black mb-2 uppercase tracking-tight text-green-600 dark:text-green-400";
                
                text.innerText = "This medication has been verified as authentic and safe for consumption. This is the first scan of this code.";
                
                dataBox.classList.remove('hidden');
                
                btn.innerText = "Scan Another Box";
                btn.className = "w-full py-4 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-bold shadow-lg shadow-green-600/30 transition-transform active:scale-95";
            } 
            else if (state === 'used') {
                icon.innerHTML = `<svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`;
                icon.className = "w-24 h-24 rounded-full mx-auto mb-6 flex items-center justify-center bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-500";
                
                title.innerText = "Already Scanned!";
                title.className = "text-2xl font-black mb-2 uppercase tracking-tight text-yellow-600 dark:text-yellow-500";
                
                text.innerText = "Warning: This QR code has already been verified previously. If you just purchased this sealed box, it may be a counterfeit copy.";
                
                dataBox.classList.remove('hidden');
                
                btn.innerText = "Report to NAFDAC";
                btn.className = "w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-white rounded-2xl font-bold shadow-lg shadow-yellow-500/30 transition-transform active:scale-95";
            }
        }

        function closeResult() {
            const card = document.getElementById('resultCard');
            card.classList.add('scale-90');
            setTimeout(() => {
                document.getElementById('resultOverlay').classList.add('hidden');
                document.getElementById('resultData').classList.add('hidden');
                isScanningPaused = false; // Resume scanning
            }, 200);
        }
    </script>
</body>
</html>
