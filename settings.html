<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance | VerifyRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { dark: '#0B1120', blue: '#1D4ED8' } } } } }
    </script>
    <link rel="stylesheet" href="/CSS/Style.css">
</head>
<body class="bg-slate-50 text-slate-900 flex min-h-screen overflow-hidden">

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-brand-dark text-slate-300 flex flex-col justify-between z-50 lg:translate-x-0 shrink-0">
        <div>
            <div class="h-20 flex items-center px-8 border-b border-slate-800 bg-black/20">
                <img src="Images/QR logo.png" alt="Logo" class="h-6 w-auto mr-3">
                <span class="text-white font-bold text-lg">VerifyRx</span>
            </div>
            <nav class="p-4 space-y-2 mt-4">
                <a href="dashboard.html" class="flex items-center px-4 py-3 hover:bg-slate-800 rounded-xl transition">📊 Overview</a>
                <a href="batches.html" class="flex items-center px-4 py-3 hover:bg-slate-800 rounded-xl transition">📦 Batches</a>
                <a href="settings.html" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-xl font-semibold shadow-lg shadow-blue-600/20">👤 Profile</a>
            </nav>
        </div>
        <div class="p-6 opacity-100 mt-4 border-t border-slate-800">
            <a href="admin.html" class="text-[9px] font-mono text-slate-500 uppercase italic">Admin_Portal</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-10 sticky top-0 z-30">
            <h1 class="text-lg font-bold">Company Compliance</h1>
            <div id="verificationStatus" class="bg-yellow-50 text-yellow-700 px-3 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest border border-yellow-100">
                ⚠️ Pending Audit
            </div>
        </header>

        <div class="p-6 lg:p-10 fade-in max-w-4xl mx-auto w-full">
            <div class="mb-10 text-center lg:text-left">
                <h2 class="text-3xl font-black mb-2">Verification Profile</h2>
                <p class="text-slate-500 text-sm">Upload your official NAFDAC documents to activate your account.</p>
            </div>

            <form id="profileForm" class="bg-white p-8 lg:p-12 rounded-[3rem] border border-slate-200 shadow-sm space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Manufacturer Name</label>
                        <input type="text" id="prof-name" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">License Number</label>
                        <input type="text" id="prof-license" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Business Address</label>
                        <input type="text" id="prof-addr" required class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                    </div>

                    <div class="md:col-span-2 space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Manufacturing License (PDF)</label>
                        <div class="border-2 border-dashed border-slate-200 rounded-[2rem] p-10 text-center hover:border-blue-400 transition-all bg-slate-50 cursor-pointer">
                            <input type="file" id="docUpload" class="hidden">
                            <p class="text-sm font-bold text-slate-600">Select Document to Upload</p>
                            <p class="text-[10px] text-slate-400 mt-2 uppercase">Official CAC or NAFDAC Papers Only</p>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold shadow-xl shadow-black/20 hover:bg-blue-600 transition-all active:scale-95">
                        Submit for Government Audit
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="/JS/main.js"></script>
    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Transmitting Documents...";
            btn.disabled = true;

            setTimeout(() => {
                const profileData = {
                    name: document.getElementById('prof-name').value,
                    addr: document.getElementById('prof-addr').value,
                    license: document.getElementById('prof-license').value,
                    isVerified: false // STAYS FALSE UNTIL ADMIN PAGE APPROVES
                };
                localStorage.setItem('verifyRx_user_profile', JSON.stringify(profileData));
                localStorage.setItem('verifyRx_user', profileData.name);
                alert('Success! Your documents have been sent to the NAFDAC Admin for review.');
                window.location.href = 'dashboard.html';
            }, 2000);
        });

        window.onload = function() {
            const saved = JSON.parse(localStorage.getItem('verifyRx_user_profile'));
            if(saved) {
                document.getElementById('prof-name').value = saved.name || "";
                document.getElementById('prof-addr').value = saved.addr || "";
                document.getElementById('prof-license').value = saved.license || "";
            }
        };
    </script>
</body>
</html>
