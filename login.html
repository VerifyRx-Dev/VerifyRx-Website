<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VerifyRx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-10 border border-slate-100 relative">
        <a href="index.html" class="absolute top-6 left-6 text-slate-400 hover:text-slate-900 transition">&larr; Back</a>
        
        <div class="text-center mb-8 mt-4">
            <a href="index.html" class="inline-block mb-4"><img src="Images/QR logo.png" alt="Logo" class="h-10 w-auto mx-auto"></a>
            <h1 class="text-2xl font-extrabold text-slate-900">Welcome back</h1>
            <p class="text-slate-500 text-sm mt-2">Log in to your manufacturer dashboard</p>
        </div>
        
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2">Company Email</label>
                <input type="email" required placeholder="admin@company.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500/20">
            </div>
            <div class="mb-8">
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500/20">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-500 transition">Sign In</button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6">Don't have an account? <a href="register.html" class="text-blue-600 font-bold hover:underline">Register here</a></p>
    </div>
</body>
</html>
